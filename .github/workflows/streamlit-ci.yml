name: Streamlit CI

# Trigger workflow on push or pull request to main branch
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repo
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Step 2: Setup Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run Streamlit app test
      - name: Run Streamlit App Test
        run: |
          # Run Streamlit in headless mode to check for errors
          streamlit run app.py --server.headless true --browser.gatherUsageStats false &
          # Wait for a few seconds to ensure it starts correctly
          sleep 10
          # Stop Streamlit process
          pkill streamlit
